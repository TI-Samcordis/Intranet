<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH | Editar Noticias</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/assets/IcoSamCordis.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== RESET BASE ===== */
        * {
            box-sizing: border-box;
        } 

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .edit {
            width: 90%;
            max-width: 900px;
            margin: 80px auto 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* ===== TÍTULO TYPEWRITER ===== */
        .intro {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #222;
        }

        /* ===== INPUT TÍTULO ===== */
        #titulo {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            transition: 0.3s ease;
        }

        #titulo:focus {
            outline: none;
            border-color: #2a57a3;
            box-shadow: 0 0 10px rgba(42, 87, 163, 0.2);
        }

        /* ===== BARRA DE FERRAMENTAS ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .toolbar button {
            background: #f0f2f5;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s ease;
        }

        .toolbar button:hover {
            background: #dfe3ea;
        }

        /* ===== EDITOR ===== */
        #editor {
            min-height: 280px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 16px;
            line-height: 1.6;
            transition: 0.3s ease;
        }

        #editor:focus {
            outline: none;
            border-color: #2a57a3;
            box-shadow: 0 0 10px rgba(42, 87, 163, 0.2);
        }

        /* ===== INPUT IMAGEM ===== */
        input[type="file"] {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 100%;
        }

        /* ===== BOTÕES ===== */
        .btn-salvar,
        .btn-noticias {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s ease;
        }

        /* Botão publicar */
        .btn-salvar {
            background: #2a57a3;
            color: white;
        }

        .btn-salvar:hover {
            background: #224b91;
            box-shadow: 0 0 15px rgba(42, 87, 163, 0.5);
            transform: translateY(-2px);
        }

        /* Botão ver notícias */
        .btn-noticias {
            background: #791e1b;
            color: white;
        }

        .btn-noticias:hover {
            background: #a02522;
            box-shadow: 0 0 15px rgba(247, 69, 37, 0.5);
            transform: translateY(-2px);
        }

        /* ===== MENSAGEM DE SUCESSO ===== */
        #mensagem {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .edit {
                padding: 20px;
            }

            .intro {
                font-size: 1.6rem;
            }

            .btn-salvar,
            .btn-noticias {
                width: 100%;
                margin-left: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <!-- <section class="main-section">
        <div class="first-container">
            <p class="intro" id="typewriter"></p>
        </div>
    </section> -->

    <section style="opacity: .9;">
        <div class="edit">

            <form id="formNoticia" action="save-noticias.php" method="POST" enctype="multipart/form-data">

                <p class="intro" id="typewriter" style="margin-bottom: 3%;"></p>

                <input type="text" id="titulo" name="titulo" placeholder="Título da notícia"
                    style="padding:10px; font-size:18px; margin-bottom:10px;" required>

                <!-- Barra -->
                <div style="margin-bottom:5px;">
                    <button type="button" onclick="format('bold')"><b>B</b></button>
                    <button type="button" onclick="format('italic')"><i>I</i></button>
                    <button type="button" onclick="format('underline')"><u>U</u></button>
                    <button type="button" onclick="format('insertUnorderedList')">• Lista</button>
                    <button type="button" onclick="format('insertOrderedList')">1. Lista</button>
                    <button type="button" onclick="format('justifyCenter')">Centro</button>
                    <button type="button" onclick="format('justifyLeft')">Esq</button>
                    <button type="button" onclick="format('justifyRight')">Dir</button>
                </div>

                <!-- Editor -->
                <div id="editor" contenteditable="true"
                    style="background:white; min-height:280px; padding:10px; border:1px solid #ccc;">
                </div>

                <!-- Campo escondido que vai enviar o HTML -->
                <input type="hidden" name="conteudo" id="conteudo">

                <input type="file" name="imagem" accept="image/*">

                <p id="mensagem" style="display:none; color:green;">Notícia publicada!</p>

                <button type="submit" id="btnSalvar" class="btn-salvar">
                    <i class="fa-solid fa-save"></i> Publicar
                </button>

            </form>

            <button class="btn-noticias" id="news">
                <i class="fa-solid fa-newspaper"></i> Ver Notícias
            </button>

        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">

            <!-- Logo -->
            <div class="footer-logo">
                <a href="/index.html">
                    <img src="/assets/SamCordis ( logo branca ).png" alt="Hospital Samcordis">
                </a>
            </div>

            <!-- Informações -->
            <div class="footer-info">
                <div class="footer-item">
                    <h4>Responsável pelo site</h4>
                    <p>Tecnologia da Informação (TI)<br><b>Ramal 2257</b></p>
                </div>

                <div class="footer-item">
                    <h4>Responsável pelo Cardápio</h4>
                    <p>Setor de Nutrição<br><b>Ramal 2220</b></p>
                </div>

                <div class="footer-item">
                    <h4>Responsável pelas Notícias</h4>
                    <p>Recursos Humanos (RH)<br><b>Ramal 2262</b></p>
                </div>
            </div>
        </div>
        <div class="footer-right">
            <p>© 2025 - 2026 | Todos os direitos reservados a equipe da TI</p>
        </div>
    </footer>

    <script>
        let noticias = [];

        document.addEventListener("DOMContentLoaded", carregar);

        function format(cmd) {
            document.execCommand(cmd, false, null);
        }

        async function carregar() {
            const resp = await fetch("noticias.json", { cache: "no-store" });
            noticias = await resp.json() ?? [];
        }

        document.getElementById("news").addEventListener("click", () => {
            window.location.href = "/pages/SamNews/ver-noticiasRH.html";
        });

        document.addEventListener("DOMContentLoaded", function () {
            const btnLogin = document.getElementById("btn-login");
            const btnLogout = document.getElementById("btn-logout");

            if (localStorage.getItem("logado") === "sim") {
                btnLogin.style.display = "none";
                btnLogout.style.display = "block";
            }

            btnLogout.addEventListener("click", () => {
                localStorage.removeItem("logado");
                localStorage.removeItem("nivel");
                window.location.href = "/index.html";
            });

            btnLogin.addEventListener("click", () => {
                window.location.href = "/login.html";
            });
        });
        document.getElementById("formNoticia").addEventListener("submit", function () {
            document.getElementById("conteudo").value =
                document.getElementById("editor").innerHTML;
        });
    </script>

    <script src="/js/login.js"></script>
    <script src="/js/buttons.js"></script>
    <script src="/js/navbar-loader.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        requireAuth("rh", "ti");
        document.addEventListener("DOMContentLoaded", () => {
            const text = "PUBLICAR NOTÍCIAS DO HOSPITAL";
            const element = document.getElementById("typewriter");
            let index = 0;

            function typeEffect() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeEffect, 40); // velocidade da digitação
                }
            }

            typeEffect();
        });
    </script>

</body>

</html>
