<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamCordis - Notícias</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/assets/IcoSamCordis.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        b,
        u {
            color: #2a57a3;
        }

        .Out {
            display: block;
            margin: 30px auto 0 auto;
            padding: 6px 20px;
            width: 200px;
            text-align: center;
            border: 2px solid #000000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s ease;
            text-transform: uppercase;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: bold;
            transition: .5s;
            background: #ffffff;
            color: #000;
            margin-bottom: 1%;
            text-decoration: none;
            color: #000000;
        }

        .Out:hover {
            background: rgb(121, 30, 27);
            box-shadow: 0 0 20px 5px rgba(247, 69, 37, 0.7);
            border: none;
            color: #fff;
        }

        .copy-btn {
            cursor: pointer;
            border: none;
            background: #ddd;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 16px;
        }

        .copy-btn:hover {
            background: #ccc;
        }

        #noticias {
            text-align: center;
            width: 50%;
            margin-left: 25%;
            margin-top: 5%;
            margin-bottom: 2%;
            font: normal 20pt solid;
        }

        .intro {
            margin-top: 10%;
            font-size: 3.5em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Ajusta imagem para vertical! 800x1200 */
        .imagem-noticia {
            width: 300px;
            height: 450px;
            object-fit: cover;
            border-radius: 12px;
            margin: 15px auto;
            display: block;
        }

        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <!--FIRST SECTION-->
    <section class="main-section">
        <div class="first-container">
            <p class="intro" id="typewriter"></p>
        </div>

        <div id="noticias"></div>
    </section>

    <footer class="footer">
        <div class="footer-container">

            <!-- Logo -->
            <div class="footer-logo">
                <a href="/index.html">
                    <img src="/assets/SamCordis ( logo branca ).png" alt="Hospital Samcordis">
                </a>
            </div>

            <!-- Informações -->
            <div class="footer-info">
                <div class="footer-item">
                    <h4>Responsável pelo site</h4>
                    <p>Tecnologia da Informação (TI)<br><b>Ramal 2257</b></p>
                </div>

                <div class="footer-item">
                    <h4>Responsável pelo Cardápio</h4>
                    <p>Setor de Nutrição<br><b>Ramal 2220</b></p>
                </div>

                <div class="footer-item">
                    <h4>Responsável pelas Notícias</h4>
                    <p>Recursos Humanos (RH)<br><b>Ramal 2262</b></p>
                </div>
            </div>
        </div>
        <div class="footer-right">
            <p>© 2025 - 2026 | Todos os direitos reservados a equipe da TI</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const text = "Notícias do hospital.";
            const element = document.getElementById("typewriter");
            let index = 0;

            function typeEffect() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeEffect, 40); // velocidade da digitação
                }
            }

            typeEffect();
        });

        fetch("noticias.json?v=" + Date.now())
            .then(r => r.json())
            .then(lista => {

                const container = document.getElementById("noticias");
                container.innerHTML = "";

                lista.forEach(n => {

                    container.innerHTML += `
                <article style="margin-bottom:20px;">
                    <h2>${n.titulo ?? "Sem título"}</h2>

                    <small style="color:#555;">
                        Publicado em: ${n.dataPublicacao
                            ? new Date(n.dataPublicacao).toLocaleString("pt-BR")
                            : "Data não informada"
                        }
                    </small>

                    ${n.imagem ? `<img src="${n.imagem}" class="imagem-noticia">` : ""}

                    <div style="margin-top:10px;">
                        ${n.mensagem ?? ""}
                    </div>

                    <hr>
                </article>
            `;
                });
            });

        if (noticia.imagem) {
            html += `<img src="${noticia.imagem}" class="imagem-noticia">`;
        }        
    </script>

    <script src="/js/login.js"></script>
    <script src="/js/buttons.js"></script>
    <script src="/js/navbar-loader.js"></script>
</body>

</html>
