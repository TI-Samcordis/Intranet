    <script>       

        function copiarTexto(idTexto, idMensagem) {
            const texto = document.getElementById(idTexto).innerText;

            // Cria uma área de texto temporária
            const textarea = document.createElement("textarea");
            textarea.value = texto;
            document.body.appendChild(textarea);

            // Seleciona e copia
            textarea.select();
            document.execCommand("copy");

            // Remove o elemento temporário
            document.body.removeChild(textarea);

            // Mostra a mensagem "Copiado!"
            const msg = document.getElementById(idMensagem);
            msg.style.display = "inline";

            setTimeout(() => {
                msg.style.display = "none";
            }, 1500);
        }

        alert("NÃO USE O CENT BROWSER PARA NAVEGAR NA INTERNET!");

        const btnMvSoul1 = document.getElementById("btnMvSoul")
        btnMvSoul1.addEventListener("click", () => {
            window.location.href = "/pages/AcessMv/acessMVSoul.html";
        });
        const btnMvPep1 = document.getElementById("btnMvPep")
        btnMvPep1.addEventListener("click", () => {
            window.location.href = "/pages/AcessMv/acessMVPep.html";
        });

         document.addEventListener("DOMContentLoaded", () => {
            const text = "Selecione qual Mv quer acessar:";
            const element = document.getElementById("typewriter");
            let index = 0;

            function typeEffect() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeEffect, 40); // velocidade da digitação
                }
            }

            typeEffect();
        });

    </script>
